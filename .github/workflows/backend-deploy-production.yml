name: 🏭 Backend — Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''

jobs:
  # ─────────────────────────────────────────────────────────────
  # GUARD: Only proceed if manually confirmed or code changed
  # ─────────────────────────────────────────────────────────────
  guard:
    name: 🛡️ Production Deploy Guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy" ]; then
            echo "❌ Confirmation failed. You must type 'deploy' to proceed."
            exit 1
          fi
          echo "✅ Production deployment confirmed by ${{ github.actor }}"

  # ─────────────────────────────────────────────────────────────
  # DEPLOY: FastAPI to Production EC2
  # ─────────────────────────────────────────────────────────────
  deploy-backend-production:
    name: Deploy FastAPI → Production EC2
    runs-on: ubuntu-latest
    needs: guard
    environment: production

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Python syntax check before deploying
      # ─────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install core dependencies (syntax check)
        working-directory: myhealthpassport-api
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn[standard] tortoise-orm aerich

      - name: ✅ Syntax check — main.py
        working-directory: myhealthpassport-api
        run: python -m py_compile main.py && echo "Syntax OK"

      # ─────────────────────────────────────────────
      # 3. Rsync API files to Production EC2
      # ─────────────────────────────────────────────
      - name: 🔑 Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_PROD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST_PROD }} >> ~/.ssh/known_hosts

      - name: 📂 Rsync API files to Production server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.git/' \
            --exclude='aerich.ini' \
            --exclude='migrations/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            myhealthpassport-api/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_PROD }}:${{ secrets.API_DIR_PROD }}/

      # ─────────────────────────────────────────────
      # 4. Install deps & restart service on server
      # ─────────────────────────────────────────────
      - name: 🚀 Install deps & restart Production service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          port: 22
          timeout: 180s
          script: |
            set -e

            echo "══════════════════════════════════════════"
            echo "🏭  MHP API — PRODUCTION DEPLOYMENT"
            echo "══════════════════════════════════════════"
            cd ${{ secrets.API_DIR_PROD }}

            echo "🐍 Activating virtual environment..."
            source venv/bin/activate

            echo "📦 Installing/updating dependencies..."
            pip install -r requirements.txt --quiet

            echo "──────────────────────────────────────"
            echo "🔁 Restarting API service..."
            echo "──────────────────────────────────────"
            sudo systemctl restart ${{ secrets.API_SERVICE_PROD }}
            sleep 3
            sudo systemctl status ${{ secrets.API_SERVICE_PROD }} --no-pager

            echo "✅ Production deployment complete!"

      # ─────────────────────────────────────────────
      # 5. Health check
      # ─────────────────────────────────────────────
      - name: 🏥 Health Check — Production API
        run: |
          echo "Waiting 15s for API to warm up..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.myhealthpassport.in/health || echo "000")
          echo "Health check response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Warning: Health check returned $STATUS — verify manually"
          else
            echo "✅ Production API is healthy!"
          fi

      # ─────────────────────────────────────────────
      # 6. Deployment Summary
      # ─────────────────────────────────────────────
      - name: 📢 Deployment Summary
        if: always()
        run: |
          echo "============================="
          echo "Environment : PRODUCTION"
          echo "Branch      : main"
          echo "Server      : ${{ secrets.EC2_HOST_PROD }}"
          echo "Directory   : ${{ secrets.API_DIR_PROD }}"
          echo "Service     : ${{ secrets.API_SERVICE_PROD }}"
          echo "Status      : ${{ job.status }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit      : ${{ github.sha }}"
          echo "============================="
