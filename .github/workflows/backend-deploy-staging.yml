name: 🚀 Backend — Deploy to Staging (UAT)

on:
  push:
    branches:
      - staging
    paths:
      - 'myhealthpassport-api/**'
  workflow_dispatch:

jobs:
  deploy-backend-staging:
    name: Deploy FastAPI → Staging EC2
    runs-on: ubuntu-latest
    environment: staging

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Python syntax check before deploying
      # ─────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install core dependencies (syntax check)
        working-directory: myhealthpassport-api
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn[standard] tortoise-orm aerich

      - name: ✅ Syntax check — main.py
        working-directory: myhealthpassport-api
        run: python -m py_compile main.py && echo "Syntax OK"

      # ─────────────────────────────────────────────
      # 3. Whitelist runner IP in EC2 Security Group
      # ─────────────────────────────────────────────
      - name: 🔓 Whitelist runner IP in EC2 Security Group
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "Runner IP: $RUNNER_IP"
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr "$RUNNER_IP/32" \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ IP whitelisted"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ─────────────────────────────────────────────
      # 4. Rsync API files to Staging EC2
      # ─────────────────────────────────────────────
      - name: 🔑 Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST_STAGING }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key and known_hosts configured"

      - name: 📂 Rsync API files to Staging server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.git/' \
            --exclude='aerich.ini' \
            --exclude='migrations/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            myhealthpassport-api/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_STAGING }}:${{ secrets.API_DIR_STAGING }}/

      # ─────────────────────────────────────────────
      # 5. Install deps & restart service on server
      # ─────────────────────────────────────────────
      - name: 🚀 Install deps & restart Staging service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e

            echo "──────────────────────────────────────"
            echo "🐍 Activating virtual environment..."
            echo "──────────────────────────────────────"
            cd ${{ secrets.API_DIR_STAGING }}
            source venv/bin/activate

            echo "📦 Installing/updating dependencies..."
            pip install -r requirements.txt --quiet

            echo "──────────────────────────────────────"
            echo "🔁 Restarting API service..."
            echo "──────────────────────────────────────"
            sudo systemctl restart ${{ secrets.API_SERVICE_STAGING }}
            sleep 3
            sudo systemctl status ${{ secrets.API_SERVICE_STAGING }} --no-pager

            echo "✅ Staging deployment complete!"

      # ─────────────────────────────────────────────
      # 6. Revoke runner IP from Security Group
      # ─────────────────────────────────────────────
      - name: 🔒 Revoke runner IP from EC2 Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr "$RUNNER_IP/32" \
            --region ${{ secrets.AWS_REGION }} || true
          echo "✅ IP revoked"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ─────────────────────────────────────────────
      # 7. Health check
      # ─────────────────────────────────────────────
      - name: 🏥 Health Check — Staging API
        run: |
          echo "Waiting 10s for API to warm up..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.myhealthpassport.in/health || echo "000")
          echo "Health check response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Warning: Health check returned $STATUS — verify manually"
          else
            echo "✅ API is healthy!"
          fi

      # ─────────────────────────────────────────────
      # 8. Deployment Summary
      # ─────────────────────────────────────────────
      - name: 📢 Deployment Summary
        if: always()
        run: |
          echo "============================="
          echo "Environment : STAGING (UAT)"
          echo "Branch      : staging"
          echo "Server      : ${{ secrets.EC2_HOST_STAGING }}"
          echo "Directory   : ${{ secrets.API_DIR_STAGING }}"
          echo "Service     : ${{ secrets.API_SERVICE_STAGING }}"
          echo "Status      : ${{ job.status }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit      : ${{ github.sha }}"
          echo "============================="
