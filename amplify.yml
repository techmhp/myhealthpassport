version: 1
applications:
  - appRoot: myhealthpassport-app
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || nvm install 20
            - node --version
            - npm --version
            - npm ci --legacy-peer-deps
        build:
          commands:
            - npx open-next@latest build
      artifacts:
        baseDirectory: .open-next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
