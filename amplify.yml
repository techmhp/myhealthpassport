version: 1
applications:
  - appRoot: myhealthpassport-app
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || nvm install 20
            - node --version
            - npm --version
            - npm ci --legacy-peer-deps
        build:
          commands:
            - echo "RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET" >> .env.local
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
